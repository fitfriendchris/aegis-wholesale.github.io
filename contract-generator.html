<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis Capital | Contract Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { font-family: 'Inter', sans-serif; background: #FFF8F0; }
.navy { background-color: #1A3A5C; color: white; }
.gold { color: #C9A227; }
</style>
</head>
<body class="min-h-screen">
<div class="navy py-6 px-4">
<div class="max-w-4xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center">⚖️</div>
<span class="text-xl font-bold">AEGIS CAPITAL | Contract Generator</span>
</div>
</div>
</div>

<div class="max-w-4xl mx-auto px-4 py-8">

<!-- Purchase Agreement -->
<div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
<h2 class="text-2xl font-bold text-gray-800 mb-4">📄 Purchase Agreement Generator</h2>

<div class="grid md:grid-cols-2 gap-4 mb-4">
<div>
<label class="block text-sm font-medium mb-1">Property Address</label>
<input id="pa_address" type="text" class="w-full px-3 py-2 border rounded-lg" placeholder="123 Main St, Houston, TX 77001">
</div>
<div>
<label class="block text-sm font-medium mb-1">Purchase Price ($)</label>
<input id="pa_price" type="number" class="w-full px-3 py-2 border rounded-lg" placeholder="150000">
</div>
</div>

<div class="grid md:grid-cols-2 gap-4 mb-4">
<div>
<label class="block text-sm font-medium mb-1">Seller Name</label>
<input id="pa_seller" type="text" class="w-full px-3 py-2 border rounded-lg" placeholder="John Doe">
</div>
<div>
<label class="block text-sm font-medium mb-1">Buyer Name (You)</label>
<input id="pa_buyer" type="text" class="w-full px-3 py-2 border rounded-lg" placeholder="Your Name">
</div>
</div>

<div class="grid md:grid-cols-2 gap-4 mb-4">
<div>
<label class="block text-sm font-medium mb-1">Close Date</label>
<input id="pa_date" type="date" class="w-full px-3 py-2 border rounded-lg">
</div>
<div>
<label class="block text-sm font-medium mb-1">State</label>
<select id="pa_state" class="w-full px-3 py-2 border rounded-lg">
<option value="TX">Texas</option>
<option value="FL">Florida</option>
<option value="GA">Georgia</option>
<option value="AZ">Arizona</option>
<option value="CO">Colorado</option>
<option value="IN">Indiana</option>
<option value="OH">Ohio</option>
<option value="MO">Missouri</option>
<option value="TN">Tennessee</option>
<option value="AL">Alabama</option>
</select>
</div>
</div>

<div class="mb-4">
<label class="block text-sm font-medium mb-1">Special Provisions</label>
<textarea id="pa_provisions" rows="3" class="w-full px-3 py-2 border rounded-lg">Buyer may assign this contract. Seller consents to assignment. Property sold AS-IS.</textarea>
</div>

<button onclick="generatePA()" class="w-full navy py-3 rounded-lg font-bold text-lg hover:bg-blue-800 transition">Generate Purchase Agreement</button>
</div>

<!-- Contract Preview -->
<div id="contractPreview" class="hidden bg-white rounded-2xl shadow-lg p-6">
<h2 class="text-2xl font-bold text-gray-800 mb-4">📋 Contract Preview</h2>
<div id="contractContent" class="bg-gray-50 p-4 rounded-lg font-mono text-sm whitespace-pre-wrap mb-4"></div>

<div class="flex gap-4">
<button onclick="downloadPDF()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">📥 Download PDF</button>
<button onclick="sendForSignature()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">✉️ Send for E-Sign</button>
</div>

<div id="esignArea" class="hidden mt-6 p-4 bg-yellow-50 rounded-lg">
<h3 class="font-bold mb-2">✍️ Click-to-Sign (Electronic Signature)</h3>
<p class="text-sm mb-4">By clicking "I AGREE" below, you electronically sign this contract with the same legal effect as a handwritten signature per the ESIGN Act and UETA.</p>
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div>
<label class="block text-sm font-medium mb-1">Seller Full Name</label>
<input id="sig_seller" type="text" class="w-full px-3 py-2 border rounded-lg">
</div>
<div>
<label class="block text-sm font-medium mb-1">Buyer Full Name</label>
<input id="sig_buyer" type="text" class="w-full px-3 py-2 border rounded-lg">
</div>
</div>
<div class="flex gap-4">
<button onclick="signContract('seller')" class="flex-1 bg-gray-600 text-white py-2 rounded-lg">Seller: I AGREE</button>
<button onclick="signContract('buyer')" class="flex-1 navy py-2 rounded-lg">Buyer: I AGREE</button>
</div>
<div id="signatures" class="mt-4 p-3 bg-white rounded border"></div>
</div>
</div>

</div>

<script>
function generatePA() {
const address = document.getElementById('pa_address').value.trim();
const price = document.getElementById('pa_price').value;
const seller = document.getElementById('pa_seller').value.trim();
const buyer = document.getElementById('pa_buyer').value.trim();
const closeDate = document.getElementById('pa_date').value;
const state = document.getElementById('pa_state').value;
const provisions = document.getElementById('pa_provisions').value.trim();
const earnest = document.getElementById('pa_earnest') ? document.getElementById('pa_earnest').value : '500';
const optionFee = document.getElementById('pa_option') ? document.getElementById('pa_option').value : '100';

if (!address || !price || !seller || !buyer || !closeDate) {
  alert('Please fill in all required fields.');
  return;
}

const priceNum = parseInt(price);
const today = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
const closeFmt = new Date(closeDate + 'T12:00:00').toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
const cityStateZip = address.includes(',') ? address.split(',').slice(1).join(',').trim() : state;
const streetAddr = address.split(',')[0];

const isTX = state === 'TX';

const contractHTML = `
<div style="font-family:'Times New Roman',Times,serif;font-size:12pt;line-height:1.7;color:#000;max-width:680px;margin:0 auto;padding:40px 32px;">

  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:8pt;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:6px;">Aegis Capital RE · Houston, TX</div>
    <h1 style="font-size:15pt;font-weight:bold;letter-spacing:0.5px;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:4px;">
      REAL ESTATE PURCHASE AND SALE AGREEMENT
    </h1>
    ${isTX ? '<div style="font-size:9pt;color:#555;margin-top:4px;">Texas Wholesale Assignment Contract · For and In Consideration of the Covenants Herein</div>' : ''}
  </div>

  <p><strong>Effective Date:</strong> ${today}</p>
  <p><strong>Anticipated Closing:</strong> On or before ${closeFmt}</p>

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">1. PARTIES</h2>
  <p><strong>SELLER:</strong> ${seller}, hereinafter referred to as "Seller."</p>
  <p><strong>BUYER:</strong> ${buyer}, and/or Assigns, hereinafter referred to as "Buyer."</p>

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">2. PROPERTY</h2>
  <p>Seller agrees to sell, and Buyer agrees to buy, the real property located at:</p>
  <p style="margin-left:24px;font-weight:bold;">${address}</p>
  <p>including all improvements, fixtures, and appurtenances thereto, hereinafter the "Property."</p>

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">3. PURCHASE PRICE & TERMS</h2>
  <p>The total purchase price is <strong>$${priceNum.toLocaleString()}</strong> ("Purchase Price"), payable as follows:</p>
  <p style="margin-left:24px;">a. Earnest Money Deposit of <strong>$${parseInt(earnest||500).toLocaleString()}</strong> delivered to Title Company within three (3) business days of execution;</p>
  ${isTX ? `<p style="margin-left:24px;">b. Option Fee of <strong>$${parseInt(optionFee||100).toLocaleString()}</strong> paid directly to Seller at execution, granting Buyer the unrestricted right to terminate during the Option Period;</p>` : ''}
  <p style="margin-left:24px;">${isTX ? 'c' : 'b'}. Balance of Purchase Price payable at closing via cash, wire transfer, or certified funds.</p>

  ${isTX ? `
  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">4. OPTION PERIOD (Texas-Specific)</h2>
  <p>Buyer shall have an unrestricted right to terminate this contract for any reason within <strong>10 days</strong> of the Effective Date ("Option Period"). This right is granted in consideration of the Option Fee paid above, which is non-refundable but credited toward the Purchase Price at closing.</p>
  ` : `
  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">4. INSPECTION PERIOD</h2>
  <p>Buyer shall have <strong>10 days</strong> from the Effective Date to inspect the Property and, at Buyer's sole discretion, terminate this agreement.</p>
  `}

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">5. PROPERTY CONDITION — AS-IS SALE</h2>
  <p>Property is sold strictly <strong>"AS-IS, WHERE-IS"</strong> in its present condition. Seller makes no warranties, express or implied, as to the condition, habitability, or fitness for any purpose. Buyer has had or has waived the right to conduct inspections. Seller is not required to make any repairs.</p>

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">6. ASSIGNMENT — BUYER'S RIGHT TO ASSIGN</h2>
  <p><strong>Buyer expressly reserves the right to assign this contract</strong> to any third party ("Assignee") at any time prior to closing. Seller acknowledges and consents to such assignment. Buyer's liability terminates upon assignment if Assignee assumes all obligations hereunder. Buyer may profit from such assignment and Seller acknowledges awareness of this.</p>
  <p style="background:#fffbe6;border-left:4px solid #C9A227;padding:8px 12px;border-radius:0 4px 4px 0;font-size:10pt;">
    <strong>SELLER DISCLOSURE:</strong> Seller acknowledges that Buyer is a real estate investor who may assign or sell Buyer's equitable interest in this contract at a price higher than the Purchase Price herein. This is a lawful wholesale real estate transaction.
  </p>

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">7. TITLE & CLOSING</h2>
  <p>Seller shall convey marketable fee simple title by General Warranty Deed, free and clear of all liens, encumbrances, and claims except those of record acceptable to Buyer. Closing shall occur at a licensed title company mutually agreed upon. Closing costs shall be split equally unless otherwise negotiated. Seller shall provide clear title and pay off all outstanding mortgages, liens, and taxes at or before closing from proceeds.</p>

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">8. DEFAULT</h2>
  <p>If Seller defaults, Buyer may seek specific performance or terminate and recover Earnest Money. If Buyer defaults after the Option Period, Seller's sole remedy is retention of the Earnest Money as liquidated damages, and this contract shall be null and void.</p>

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">9. ADDITIONAL PROVISIONS</h2>
  <p>${provisions || 'None. Standard terms apply.'}</p>

  ${isTX ? `
  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">10. TEXAS INVESTOR DISCLOSURE</h2>
  <p style="font-size:10pt;">Pursuant to Texas Property Code §5.086 and the Texas Real Estate License Act, Buyer discloses that: (i) Buyer is purchasing the Property as a principal investor and not as a licensed real estate agent or broker; (ii) Buyer may assign equitable interest in this contract; (iii) this transaction is a wholesale real estate purchase and Buyer may realize a profit on assignment; (iv) Seller has the right to consult with an attorney or a licensed real estate agent prior to executing this agreement.</p>
  ` : ''}

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">${isTX ? '11' : '10'}. GOVERNING LAW</h2>
  <p>This Agreement shall be governed by the laws of the State of ${state === 'TX' ? 'Texas' : state}. Any disputes shall be resolved in the county where the Property is located.</p>

  <h2 style="font-size:11pt;margin-top:20px;border-bottom:1px solid #ccc;padding-bottom:4px;">${isTX ? '12' : '11'}. ENTIRE AGREEMENT</h2>
  <p>This Agreement constitutes the entire agreement between the parties and supersedes all prior negotiations. Modifications must be in writing and signed by all parties.</p>

  <div style="margin-top:40px;border-top:2px solid #000;padding-top:24px;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;">
      <div>
        <p style="font-weight:bold;margin-bottom:4px;">SELLER</p>
        <div style="border-bottom:1px solid #000;min-height:40px;margin-bottom:6px;" id="seller-sig-line"></div>
        <p style="font-size:10pt;">${seller}</p>
        <p style="font-size:10pt;">Date: ___________________</p>
      </div>
      <div>
        <p style="font-weight:bold;margin-bottom:4px;">BUYER</p>
        <div style="border-bottom:1px solid #000;min-height:40px;margin-bottom:6px;" id="buyer-sig-line"></div>
        <p style="font-size:10pt;">${buyer}, and/or Assigns</p>
        <p style="font-size:10pt;">Date: ___________________</p>
      </div>
    </div>

    <div style="margin-top:24px;font-size:9pt;color:#666;border-top:1px solid #eee;padding-top:12px;">
      <strong>NOTE:</strong> This document is a template for educational and informational purposes. Consult a licensed Texas real estate attorney before using in a live transaction. Aegis Capital RE makes no representations as to the legal sufficiency of this document in any specific jurisdiction.
    </div>
  </div>

</div>`;

document.getElementById('contractContent').innerHTML = contractHTML;
document.getElementById('contractPreview').classList.remove('hidden');
document.getElementById('esignArea').classList.remove('hidden');
document.getElementById('sig_seller').value = seller;
document.getElementById('sig_buyer').value = buyer;
window.scrollTo({ top: document.getElementById('contractPreview').offsetTop - 20, behavior: 'smooth' });
}

function downloadPDF() {
  // Use browser print-to-PDF — most reliable cross-platform
  const content = document.getElementById('contractContent').innerHTML;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head>
    <title>Purchase Agreement — Aegis Capital RE</title>
    <style>
      @media print { body { margin: 0; } }
      body { font-family:'Times New Roman',Times,serif; }
    </style>
  </head><body>${content}<script>window.onload=function(){window.print();}<\/script></body></html>`);
  win.document.close();
}

function sendForSignature() {
const content = document.getElementById('contractContent').textContent;
// Copy to clipboard
navigator.clipboard.writeText(content).then(() => {
alert('Contract copied! Paste into HelloSign (hellosign.com) for free e-signatures.');
window.open('https://www.hellosign.com', '_blank');
});
}

function signContract(role) {
const name = document.getElementById(`sig_${role}`).value;
const date = new Date().toLocaleDateString();
const sigDiv = document.getElementById('signatures');
sigDiv.innerHTML += `<div class="mb-2"><strong>${role.toUpperCase()} SIGNED:</strong> ${name} | ${date} | IP: ${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}</div>`;
}
</script>
</body>
</html>
